<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let labels = JSON.parse('{{ subjects | tojson | safe }}');
let data = JSON.parse('{{ marks | tojson | safe }}');

const ctx = document.getElementById('chart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Average Marks',
            data: data,
            borderWidth: 1
        }]
    }
});
</script>
