{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Marks Management</h3>
</div>

<!-- 🔥 ADD MARK -->
<div class="card p-3 mb-4 shadow-sm">

    <h5>Add / Update Marks</h5>

    <form method="POST" class="row g-2">

        <div class="col-md-4">
            <select name="student_id" class="form-select" required>
                <option value="">Select Student</option>
                {% for s in students %}
                    <option value="{{s[0]}}">{{s[1]}}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <select name="subject" class="form-select" required>
                <option value="">Subject</option>
                <option>CN</option>
                <option>DAA</option>
                <option>TOC</option>
                <option>WT</option>
                <option>DBMS</option>
            </select>
        </div>

        <div class="col-md-3">
            <input type="number" name="mark" class="form-control" placeholder="Mark" required>
        </div>

        <div class="col-md-2">
            <button class="btn btn-success w-100">Save</button>
        </div>

    </form>
</div>

<!-- 🔥 TABLE -->
<table class="table table-bordered table-striped shadow-sm">

    <thead class="table-dark">
        <tr>
            <th>Student</th>
            <th>Subject</th>
            <th>Mark</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for m in marks %}
        <tr>
            <td>{{m[1]}}</td>
            <td>{{m[2]}}</td>
            <td>{{m[3]}}</td>
            <td>
                <a href="/edit_mark/{{m[0]}}" class="btn btn-warning btn-sm">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% endblock %}
