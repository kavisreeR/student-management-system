{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Students Management</h3>
</div>

<!-- 🔥 ADD STUDENT -->
<div class="card p-3 mb-4 shadow-sm">

    <h5>Add Student</h5>

    <form action="/add" method="POST" class="row g-2">

        <div class="col-md-3">
            <input type="text" name="name" class="form-control" placeholder="Name" required>
        </div>

        <div class="col-md-2">
            <input type="number" name="age" class="form-control" placeholder="Age" required>
        </div>

        <div class="col-md-3">
            <select name="dept_id" class="form-select">
                {% for d in depts %}
                    <option value="{{d[0]}}">{{d[1]}}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-2">
            <input type="text" name="year" class="form-control" placeholder="Year">
        </div>

        <div class="col-md-2">
            <button class="btn btn-success w-100">Add</button>
        </div>

    </form>
</div>

<!-- 🔥 SEARCH + FILTER -->
<div class="card p-3 mb-3 shadow-sm">

    <div class="row g-2">

        <!-- 🔥 LIVE SEARCH -->
        <div class="col-md-6">
            <input type="text" id="searchBox" class="form-control" placeholder="Live search student">
        </div>

        <!-- 🔥 FILTER -->
        <div class="col-md-6">
            <form action="/filter" method="GET" class="d-flex">
                <select name="dept_id" class="form-select me-2">
                    {% for d in depts %}
                        <option value="{{d[0]}}">{{d[1]}}</option>
                    {% endfor %}
                </select>
                <button class="btn btn-dark">Filter</button>
            </form>
        </div>

    </div>

</div>

<!-- 🔥 TABLE -->
<table class="table table-striped table-hover table-bordered bg-white shadow-sm">

    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Dept</th>
            <th>Reg No</th>
            <th>Year</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for s in students %}
        <tr>
            <td>{{s[0]}}</td>
            <td>{{s[1]}}</td>
            <td>{{s[2]}}</td>
            <td>{{s[3]}}</td>
            <td>{{s[4]}}</td>
            <td>{{s[5]}}</td>
            <td>
                <a href="/edit/{{s[0]}}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{s[0]}}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

<!-- 🔥 LIVE SEARCH SCRIPT -->
<script>
document.getElementById("searchBox").addEventListener("keyup", function() {

    fetch("/search_ajax?name=" + this.value)
    .then(res => res.json())
    .then(data => {

        let rows = "";

        data.data.forEach(function(s) {
            rows += `
                <tr>
                    <td>${s[0]}</td>
                    <td>${s[1]}</td>
                    <td>${s[2]}</td>
                    <td>${s[3]}</td>
                    <td>${s[4]}</td>
                    <td>${s[5]}</td>
                    <td>
                        <a href="/edit/${s[0]}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete/${s[0]}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            `;
        });

        document.querySelector("tbody").innerHTML = rows;

    });
});
</script>

{% endblock %}
